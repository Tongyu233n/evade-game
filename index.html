<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>躲避者 - 蓝天草地版</title>
  <style>
    :root {
      --ink: #1b3b30;
      --safe: #2a8f54;
      --danger: #cc3c3c;
      --warn: #b56d22;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #73c5ff 0%, #d8f3ff 65%, #ebffe9 100%);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
    }
    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .hud {
      position: fixed;
      left: 14px;
      top: 10px;
      z-index: 10;
      pointer-events: none;
      font-weight: 700;
      line-height: 1.55;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
    }
    .tips {
      position: fixed;
      right: 14px;
      top: 10px;
      z-index: 10;
      pointer-events: none;
      text-align: right;
      font-size: 13px;
      line-height: 1.5;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
    }
    .safe { color: var(--safe); }
    .danger { color: var(--danger); }
    .warn { color: var(--warn); }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 20, 16, 0.38);
      backdrop-filter: blur(3px);
    }
    .panel {
      width: min(760px, 90vw);
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(48, 92, 71, 0.4);
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    .panel p {
      margin: 8px 0;
      line-height: 1.55;
      font-size: 15px;
    }
    .panel button {
      margin-top: 10px;
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: #2f855a;
      cursor: pointer;
    }
    .pay-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8, 14, 12, 0.5);
    }
    .pay-card {
      width: min(420px, 88vw);
      background: rgba(255, 255, 255, 0.96);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.25);
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInPay 0.35s ease forwards;
      text-align: center;
    }
    .pay-card img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      display: block;
      margin: 0 auto 12px;
    }
    .pay-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .pay-actions button {
      margin-top: 0;
      min-width: 120px;
    }
    .pay-actions .cancel-btn {
      background: #64748b;
    }
    @keyframes fadeInPay {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud" class="hud"></div>
  <div class="tips">
    A/D: 左右移动 | W: 跳跃/爬梯上行<br />
    S: 爬梯下行/穿平台下落 | J: 射击 | K: 体术 | P: 复活 | R: 重开
  </div>
  <div class="overlay" id="startOverlay">
    <div class="panel">
      <h2>躲避者</h2>
      <p>在随机平台场景中存活并逃生，偶数关将出现精英怪。</p>
      <button id="startBtn">开始游戏</button>
    </div>
  </div>
  <div class="overlay" id="introOverlay" style="display:none;">
    <div class="panel">
      <h2>游戏介绍</h2>
      <p>玩法说明：躲避怪物并尽量生存，达到条件后进门进入下一关。地形包含平台、梯子和障碍，按 S 可穿平台下落。</p>
      <p>怪物说明：小怪会追击、跳跃、爬梯、开枪；精英怪拥有地动山摇、冲击波、冲撞与陨石雨等技能。</p>
      <p>武器说明：地图会周期刷出多种特殊武器，拾取后可跨关卡保留。</p>
      <button id="enterBtn">进入战斗</button>
    </div>
  </div>
  <div class="pay-modal" id="payModal">
    <div class="pay-card">
      <img src="pay.png" alt="支付二维码" />
      <p>是否已支付成功？支付成功可原地满血复活。</p>
      <div class="pay-actions">
        <button id="paidBtn">已支付</button>
        <button class="cancel-btn" id="cancelPayBtn">取消</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const hud = document.getElementById("hud");
      const startOverlay = document.getElementById("startOverlay");
      const introOverlay = document.getElementById("introOverlay");
      const startBtn = document.getElementById("startBtn");
      const enterBtn = document.getElementById("enterBtn");
      const payModal = document.getElementById("payModal");
      const paidBtn = document.getElementById("paidBtn");
      const cancelPayBtn = document.getElementById("cancelPayBtn");

      const keys = new Set();
      const rand = (a, b) => a + Math.random() * (b - a);
      const randi = (a, b) => Math.floor(rand(a, b + 1));
      const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
      const intersects = (a, b) => a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;

      let vw = 1280;
      let vh = 720;
      let dpr = 1;
      let gameStarted = false;
      let gameWin = false;

      let level = 1;
      let lives = 5;
      let elapsed = 0;
      let gameOver = false;
      let invincible = 0;
      let victoryFlash = 0;
      let shake = 0;
      let playerLevel = 1;
      let playerExp = 0;
      const expPerLevel = 100;

      let fireCd = 0;
      let ammo = 30;
      const maxAmmo = 30;
      let reloadTimer = 0;
      let meleeCd = 0;
      let lastK = false;
      let weaponMode = "normal";
      let mgAmmo = 0;
      let swordUses = 0;
      let rpgAmmo = 0;
      let sniperAmmo = 0;
      let freezeAmmo = 0;
      let specialSpawnTimer = 15;
      let specialItems = [];
      let healthSpawnTimer = 30;
      let healthItem = null;
      let meleeFx = 0;
      let skillBanner = { text: "", timer: 0 };
      let bossFx = [];
      let bossTelegraphs = [];
      let bossTraps = [];
      let playerBindTimer = 0;
      let playerSlowTimer = 0;

      let world = { w: 2600, h: 1500 };
      let camera = { x: 0, y: 0 };
      let platforms = [];
      let obstacles = [];
      let ladders = [];
      let reachablePlatforms = [];
      let monsters = [];
      let bullets = [];
      let enemyBullets = [];
      let hitParticles = [];
      let door = null;

      const player = {
        x: 120,
        y: 100,
        w: 34,
        h: 48,
        vx: 0,
        vy: 0,
        speed: 330,
        jump: 560,
        face: 1,
        onGround: false,
        onLadder: false,
        dropTimer: 0
      };

      function resize() {
        vw = window.innerWidth;
        vh = window.innerHeight;
        dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        canvas.width = Math.floor(vw * dpr);
        canvas.height = Math.floor(vh * dpr);
        canvas.style.width = `${vw}px`;
        canvas.style.height = `${vh}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function fullSolids() {
        if (!platforms.length) return obstacles;
        return [platforms[0], ...obstacles];
      }

      function semiPlatforms() {
        return platforms.slice(1);
      }

      function allBulletSolids() {
        return [...platforms, ...obstacles];
      }

      function getLadderTouch(entity) {
        for (const l of ladders) {
          const cx = entity.x + entity.w * 0.5;
          if (cx > l.x && cx < l.x + l.w && entity.y + entity.h > l.y && entity.y < l.y + l.h) return l;
        }
        return null;
      }

      function isStandingOnSemi(entity) {
        const feet = entity.y + entity.h;
        return semiPlatforms().some((p) => {
          const overlapX = entity.x + entity.w > p.x + 4 && entity.x < p.x + p.w - 4;
          return overlapX && Math.abs(feet - p.y) <= 4;
        });
      }

      function moveEntity(entity, dt) {
        const oldBottom = entity.y + entity.h;

        entity.x += entity.vx * dt;
        for (const s of fullSolids()) {
          if (intersects(entity, s)) {
            if (entity.vx > 0) entity.x = s.x - entity.w;
            else if (entity.vx < 0) entity.x = s.x + s.w;
            entity.vx = 0;
          }
        }

        entity.y += entity.vy * dt;
        entity.onGround = false;

        for (const s of fullSolids()) {
          if (intersects(entity, s)) {
            if (entity.vy > 0) {
              entity.y = s.y - entity.h;
              entity.vy = 0;
              entity.onGround = true;
            } else if (entity.vy < 0) {
              entity.y = s.y + s.h;
              entity.vy = 0;
            }
          }
        }

        if (entity.vy >= 0 && !(entity.dropTimer > 0)) {
          for (const p of semiPlatforms()) {
            const overlapX = entity.x + entity.w > p.x + 4 && entity.x < p.x + p.w - 4;
            const crossed = oldBottom <= p.y + 3 && entity.y + entity.h >= p.y;
            if (overlapX && crossed) {
              entity.y = p.y - entity.h;
              entity.vy = 0;
              entity.onGround = true;
            }
          }
        }

        entity.x = clamp(entity.x, 0, world.w - entity.w);
        entity.y = clamp(entity.y, 0, world.h - entity.h);
      }

      function canReachPlatform(from, to) {
        const fc = from.x + from.w * 0.5;
        const tc = to.x + to.w * 0.5;
        const dx = Math.abs(fc - tc);
        const dy = to.y - from.y;
        const overlap = Math.min(from.x + from.w, to.x + to.w) - Math.max(from.x, to.x);
        const jumpReach = dy < 0 && Math.abs(dy) < 150 && dx < 300;
        const dropReach = dy > 0 && dy < 300 && dx < 330;
        const walkReach = Math.abs(dy) < 18 && (overlap > 0 || dx < 120);
        const ladderReach = ladders.some((l) => {
          const lx = l.x + l.w * 0.5;
          const a = lx > from.x - 24 && lx < from.x + from.w + 24 && l.y < from.y + from.h + 8 && l.y + l.h > from.y - 8;
          const b = lx > to.x - 24 && lx < to.x + to.w + 24 && l.y < to.y + to.h + 8 && l.y + l.h > to.y - 8;
          return a && b;
        });
        return jumpReach || dropReach || walkReach || ladderReach;
      }

      function getReachablePlatforms() {
        if (!platforms.length) return [];
        const visited = new Set([0]);
        const q = [0];
        while (q.length) {
          const i = q.shift();
          for (let j = 0; j < platforms.length; j++) {
            if (i === j || visited.has(j)) continue;
            if (canReachPlatform(platforms[i], platforms[j])) {
              visited.add(j);
              q.push(j);
            }
          }
        }
        return [...visited];
      }

      function findPlatformByX(x) {
        let best = platforms[0] || { x: 0, y: world.h - 80, w: world.w, h: 80 };
        let bestScore = 1e9;
        for (const p of platforms) {
          const cx = p.x + p.w * 0.5;
          const score = Math.abs(cx - x) + p.y * 0.2;
          if (score < bestScore) {
            bestScore = score;
            best = p;
          }
        }
        return best;
      }

      function spawnAtPlatform(entity, p) {
        entity.x = clamp(p.x + rand(8, Math.max(9, p.w - entity.w - 8)), 20, world.w - entity.w - 20);
        entity.y = p.y - entity.h - 1;
        entity.vx = 0;
        entity.vy = 0;
        entity.onGround = false;
        entity.onLadder = false;
      }

      function spawnPlayer() {
        spawnAtPlatform(player, platforms[0]);
        player.dropTimer = 0;
      }

      function spawnInCurrentScreen(m, withAnim) {
        let targetX = player.x + rand(-420, 420);
        let tries = 0;
        while (tries < 45) {
          const sx = rand(camera.x + 40, camera.x + vw - 40);
          const dist = Math.abs(sx - player.x);
          if (dist >= 180 && dist <= 520) {
            targetX = sx;
            break;
          }
          tries++;
        }
        targetX = clamp(targetX, 30, world.w - 30);
        const p = findPlatformByX(targetX);
        spawnAtPlatform(m, p);
        m.huntTimer = 0;
        m.respawnTimer = withAnim ? 0.75 : 0;
        m.shootCd = 3;
        if (typeof m.maxHp === "number") m.hp = m.maxHp;
      }

      function isBossLevel(lv) {
        return lv % 2 === 0;
      }

      function setSkillBanner(text) {
        skillBanner.text = text;
        skillBanner.timer = 1.1;
      }

      function makeNormalMonster(speed) {
        return {
          type: "normal",
          x: 0, y: 0, w: 34, h: 46,
          vx: 0, vy: 0, onGround: false, onLadder: false,
          dropTimer: 0,
          speed,
          jumpCd: rand(0.4, 1.2),
          stun: 0, hitFlash: 0, huntTimer: 0, respawnTimer: 0,
          shootCd: 3,
          hp: 150,
          maxHp: 150
        };
      }

      function spawnSpecialItem() {
        const typePool = ["mg", "sword", "rpg", "sniper", "freeze"];
        const candidates = reachablePlatforms.filter((idx) => idx > 0).map((idx) => platforms[idx]);
        specialItems = [];
        for (let i = 0; i < 5; i++) {
          const type = typePool[randi(0, typePool.length - 1)];
          const p = candidates.length ? candidates[randi(0, candidates.length - 1)] : platforms[0];
          specialItems.push({
            type,
            x: p.x + rand(10, Math.max(12, p.w - 44)),
            y: p.y - 36,
            w: 34,
            h: 30,
            ttl: 24
          });
        }
        setSkillBanner("特殊武器出现！");
      }

      function spawnHealthItem() {
        const candidates = reachablePlatforms.filter((idx) => idx > 0).map((idx) => platforms[idx]);
        const p = candidates.length ? candidates[randi(0, candidates.length - 1)] : platforms[0];
        healthItem = {
          x: p.x + rand(10, Math.max(12, p.w - 36)),
          y: p.y - 34,
          w: 28,
          h: 28,
          ttl: 20
        };
        setSkillBanner("血包补给已出现！");
      }

      function grantSpecial(type) {
        if (type === "mg") {
          weaponMode = "mg";
          mgAmmo = 100;
          swordUses = 0;
          rpgAmmo = 0;
          sniperAmmo = 0;
          freezeAmmo = 0;
          setSkillBanner("获得机关枪：100发");
        } else if (type === "sword") {
          weaponMode = "sword";
          swordUses = 5;
          mgAmmo = 0;
          rpgAmmo = 0;
          sniperAmmo = 0;
          freezeAmmo = 0;
          setSkillBanner("获得宝剑：强化体术5次");
        } else if (type === "rpg") {
          weaponMode = "rpg";
          rpgAmmo = 1;
          mgAmmo = 0;
          swordUses = 0;
          sniperAmmo = 0;
          freezeAmmo = 0;
          setSkillBanner("获得RPG：1发追踪导弹");
        } else if (type === "sniper") {
          weaponMode = "sniper";
          sniperAmmo = 6;
          mgAmmo = 0;
          swordUses = 0;
          rpgAmmo = 0;
          freezeAmmo = 0;
          setSkillBanner("获得狙击枪：6发高伤");
        } else if (type === "freeze") {
          weaponMode = "freeze";
          freezeAmmo = 24;
          mgAmmo = 0;
          swordUses = 0;
          rpgAmmo = 0;
          sniperAmmo = 0;
          setSkillBanner("获得冰冻枪：24发减速");
        }
      }

      function makeLevel(lv, keepLoadout = false) {
        level = Math.min(10, lv);
        gameWin = false;
        elapsed = 0;
        invincible = 0;
        fireCd = 0;
        meleeCd = 0;
        specialSpawnTimer = 15;
        specialItems = [];
        healthSpawnTimer = 30;
        healthItem = null;
        if (!keepLoadout) {
          if (level === 1) {
            playerLevel = 1;
            playerExp = 0;
          }
          ammo = maxAmmo;
          reloadTimer = 0;
          weaponMode = "normal";
          mgAmmo = 0;
          swordUses = 0;
          rpgAmmo = 0;
          sniperAmmo = 0;
          freezeAmmo = 0;
        }
        bullets = [];
        enemyBullets = [];
        hitParticles = [];
        bossFx = [];
        bossTelegraphs = [];
        bossTraps = [];
        door = null;
        reachablePlatforms = [];
        victoryFlash = 0;

        world.w = Math.max(2200, Math.floor(vw * rand(1.8, 2.4)));
        world.h = Math.max(1300, Math.floor(vh * rand(1.5, 2.1)));

        platforms = [];
        obstacles = [];
        ladders = [];
        monsters = [];

        const floorH = 84;
        const floor = { x: 0, y: world.h - floorH, w: world.w, h: floorH };
        platforms.push(floor);

        if (isBossLevel(level)) {
          const y1 = world.h - floorH - 210;
          const y2 = world.h - floorH - 430;
          platforms.push({ x: 80, y: y1, w: world.w - 160, h: 24 });
          platforms.push({ x: 140, y: y2, w: world.w - 280, h: 24 });
          const ladderXs = [world.w * 0.2, world.w * 0.5, world.w * 0.8];
          for (const lx of ladderXs) {
            ladders.push({ x: lx - 15, y: y2 - 6, w: 30, h: (y1 - y2) + 36 });
            ladders.push({ x: lx + 40 - 15, y: y1 - 6, w: 30, h: (floor.y - y1) + 36 });
          }
        } else {
          const tiers = [[floor]];
          const tierCount = 8 + Math.floor(level * 0.65);
          let prevY = floor.y - 95;
          for (let t = 1; t <= tierCount; t++) {
            const y = clamp(prevY - rand(85, 115), 120, world.h - floorH - 110);
            prevY = y;
            const count = 5 + (t % 2) + Math.floor(level * 0.15);
            const row = [];
            const margin = 70;
            const laneW = (world.w - margin * 2) / count;
            for (let i = 0; i < count; i++) {
              const pw = rand(240, Math.min(430, laneW + 140));
              const px = clamp(margin + i * laneW + rand(-32, 32), 20, world.w - pw - 20);
              const p = { x: px, y, w: pw, h: rand(18, 26) };
              row.push(p);
              platforms.push(p);
            }
            row.sort((a, b) => a.x - b.x);
            tiers.push(row);
          }

          const bridgeCount = 14 + Math.floor(level * 1.4);
          for (let i = 0; i < bridgeCount; i++) {
            const row = tiers[randi(1, tiers.length - 1)];
            const anchor = row[randi(0, row.length - 1)];
            const bw = rand(170, 300);
            const bx = clamp(anchor.x + rand(-160, 160), 20, world.w - bw - 20);
            const by = clamp(anchor.y + rand(-38, 38), 120, world.h - floorH - 100);
            platforms.push({ x: bx, y: by, w: bw, h: rand(16, 24) });
          }

          const ladderSet = new Set();
          for (let t = 1; t < tiers.length; t++) {
            const upper = tiers[t];
            const lower = tiers[t - 1];
            for (const up of upper) {
              let best = lower[0];
              let bestDist = 1e9;
              const uc = up.x + up.w * 0.5;
              for (const lo of lower) {
                const lc = lo.x + lo.w * 0.5;
                const dist = Math.abs(uc - lc);
                if (dist < bestDist) {
                  bestDist = dist;
                  best = lo;
                }
              }
              const x = clamp((uc + best.x + best.w * 0.5) * 0.5 - 15, 16, world.w - 46);
              const top = Math.min(up.y, best.y);
              const bottom = Math.max(up.y, best.y);
              const key = `${Math.round(x / 18)}-${Math.round(top / 18)}-${Math.round(bottom / 18)}`;
              if (!ladderSet.has(key)) {
                ladderSet.add(key);
                ladders.push({ x, y: top - 6, w: 30, h: Math.max(96, bottom - top + 34) });
              }
            }
          }

          const extraLadders = 12 + Math.floor(level * 1.7);
          for (let i = 0; i < extraLadders; i++) {
            const t1 = randi(1, tiers.length - 1);
            const t2 = randi(0, Math.max(0, tiers.length - 2));
            const a = tiers[t1][randi(0, tiers[t1].length - 1)];
            const b = tiers[t2][randi(0, tiers[t2].length - 1)];
            const x = clamp((a.x + a.w * 0.5 + b.x + b.w * 0.5) * 0.5 - 15, 16, world.w - 46);
            const top = Math.min(a.y, b.y);
            const bottom = Math.max(a.y, b.y);
            ladders.push({ x, y: top - 6, w: 30, h: Math.max(96, bottom - top + 34) });
          }

          const obsCount = 16 + level * 3;
          for (let i = 0; i < obsCount; i++) {
            const p = platforms[randi(1, platforms.length - 1)];
            const ow = rand(24, Math.min(64, p.w * 0.28));
            const oh = rand(24, 70);
            const ox = clamp(p.x + rand(8, p.w - ow - 8), p.x + 6, p.x + p.w - ow - 6);
            const oy = p.y - oh;
            const nearLadder = ladders.some((l) => ox + ow > l.x - 8 && ox < l.x + l.w + 8 && oy + oh > l.y && oy < l.y + l.h);
            if (!nearLadder) obstacles.push({ x: ox, y: oy, w: ow, h: oh });
          }
        }

        reachablePlatforms = getReachablePlatforms();
        spawnPlayer();

        if (isBossLevel(level)) {
          const isDracula = level === 10;
          const hp = isDracula ? 100000 : 10000 + Math.max(0, level - 2) * 2500;
          const bossName = level === 2 ? "狂怒巨像" : level === 4 ? "毒牙蜘蛛" : level === 6 ? "地狱火焰鸟" : level === 8 ? "埃及法老" : "德古拉";
          const boss = {
            type: "boss",
            x: 0, y: 0, w: 96, h: 128,
            vx: 0, vy: 0, onGround: false, onLadder: false,
            dropTimer: 0,
            speed: Math.min(player.speed * 0.9, 150 + lv * 8),
            jumpCd: 0.8, stun: 0, hitFlash: 0, huntTimer: 0, respawnTimer: 0,
            shootCd: 3,
            hp, maxHp: hp,
            bossName,
            slamCd: 7,
            waveCd: 9,
            dashCd: 6,
            meteorCd: 10,
            summonCd: 5,
            sigilCd: 6,
            laserCd: 8,
            laserState: "idle",
            laserTimer: 0,
            laserDir: 1,
            isDracula,
            webCd: 4,
            trapCd: 5,
            leapCd: 4,
            barrageCd: 4,
            barrageShots: 0,
            barrageTick: 0,
            ramCd: 6,
            ramState: "idle",
            ramTimer: 0,
            reviveCharges: (level === 8 || isDracula) ? 3 : 0,
            revivePending: false,
            reviveTimer: 0,
            waveBurst: 0,
            waveTick: 0
          };
          if (level === 4) {
            boss.w = 110;
            boss.h = 76;
          }
          if (level === 6) {
            boss.w = 122;
            boss.h = 92;
          }
          if (level === 8) {
            boss.w = 92;
            boss.h = 132;
          }
          spawnInCurrentScreen(boss, true);
          monsters.push(boss);
        }

        if (!isBossLevel(level)) {
          const count = 5 + Math.floor((level - 1) / 2) * 2;
          const speed = Math.min(player.speed * 0.95, player.speed / 3 * (1 + (level - 1) * 0.12));
          for (let i = 0; i < count; i++) {
            const m = makeNormalMonster(speed);
            spawnInCurrentScreen(m, false);
            monsters.push(m);
          }
        }
      }

      function damagePlayer(fromX, amount = 1) {
        if (invincible > 0) return;
        lives = Math.max(0, lives - amount);
        invincible = 3;
        const k = Math.sign(player.x - fromX || 1);
        player.vx = k * 340;
        player.vy = -260;
        shake = Math.max(shake, 0.35);
        if (lives <= 0) gameOver = true;
      }

      function scaledDamage(base) {
        return Math.max(1, Math.floor(base * (1 + 0.12 * (playerLevel - 1))));
      }

      function gainExp(amount) {
        playerExp += amount;
        while (playerExp >= expPerLevel) {
          playerExp -= expPerLevel;
          playerLevel++;
          setSkillBanner(`角色升级！Lv.${playerLevel}`);
        }
      }

      function onMonsterDefeated(m) {
        gainExp(m.type === "boss" ? 100 : 20);
        monsters = monsters.filter((x) => x !== m);
        if (m.type === "boss") {
          if (level === 10 && m.bossName === "德古拉") {
            gameWin = true;
            gameStarted = false;
            setSkillBanner("德古拉已被击败！你通关了！");
          } else {
            door = { x: m.x + m.w * 0.5 - 27, y: m.y - 74, w: 54, h: 74, pulse: 0 };
            setSkillBanner("精英怪已击败，大门出现！");
          }
        }
      }

      function resolveMonsterZeroHp(m) {
        if (m.type === "boss" && (m.bossName === "埃及法老" || m.bossName === "德古拉") && m.reviveCharges > 0) {
          if (!m.revivePending) {
            m.revivePending = true;
            m.reviveTimer = 5;
            m.hp = m.bossName === "德古拉" ? 12000 : 1200;
            m.vx = 0;
            m.vy = 0;
            setSkillBanner(`${m.bossName}释放：复活仪式！`);
            return;
          }
          m.reviveCharges = 0;
        }

        if (m.type === "boss" && m.bossName === "地狱火焰鸟") {
          for (let i = 0; i < 16; i++) {
            const ang = (Math.PI * 2 * i) / 16;
            enemyBullets.push({
              x: m.x + m.w * 0.5,
              y: m.y + m.h * 0.5,
              w: 10,
              h: 10,
              vx: Math.cos(ang) * 260,
              vy: Math.sin(ang) * 260,
              life: 2.8,
              kind: "fireball"
            });
          }
          setSkillBanner("地狱火焰鸟：终焉自爆！");
        }

        onMonsterDefeated(m);
      }

      function summonServant(boss) {
        const servants = monsters.filter((x) => x.type === "servant").length;
        if (servants >= 5) return;
        const s = {
          type: "servant",
          x: boss.x + rand(-80, 80),
          y: boss.y,
          w: 28, h: 38,
          vx: 0, vy: 0, onGround: false, onLadder: false,
          dropTimer: 0,
          speed: Math.min(player.speed * 0.9, 150),
          jumpCd: rand(0.4, 1.1),
          stun: 0, hitFlash: 0, huntTimer: 0, respawnTimer: 0,
          shootCd: 3.5,
          hp: 50,
          maxHp: 50
        };
        s.x = clamp(s.x, 20, world.w - s.w - 20);
        const p = findPlatformByX(s.x);
        spawnAtPlatform(s, p);
        monsters.push(s);
      }

      function playerFire() {
        if (reloadTimer > 0) return;

        if (weaponMode === "mg") {
          if (mgAmmo <= 0) {
            weaponMode = "normal";
            return;
          }
          bullets.push({
            x: player.x + (player.face > 0 ? player.w - 2 : -8),
            y: player.y + player.h * 0.5 - 2,
            w: 10, h: 4,
            vx: player.face * 900,
            vy: rand(-28, 28),
            life: 1.2,
            damage: scaledDamage(40),
            kind: "mg"
          });
          mgAmmo--;
          fireCd = 0.06;
          if (mgAmmo <= 0) weaponMode = "normal";
          return;
        }

        if (weaponMode === "rpg") {
          if (rpgAmmo <= 0) {
            weaponMode = "normal";
            return;
          }
          bullets.push({
            x: player.x + (player.face > 0 ? player.w : -14),
            y: player.y + player.h * 0.5 - 5,
            w: 16, h: 10,
            vx: player.face * 320,
            vy: 0,
            life: 6,
            damage: scaledDamage(3000),
            kind: "rpg"
          });
          rpgAmmo--;
          fireCd = 0.35;
          if (rpgAmmo <= 0) weaponMode = "normal";
          return;
        }

        if (weaponMode === "sniper") {
          if (sniperAmmo <= 0) {
            weaponMode = "normal";
            return;
          }
          bullets.push({
            x: player.x + (player.face > 0 ? player.w : -16),
            y: player.y + player.h * 0.5 - 2,
            w: 14, h: 4,
            vx: player.face * 1200,
            vy: 0,
            life: 1.8,
            damage: scaledDamage(700),
            kind: "sniper"
          });
          sniperAmmo--;
          fireCd = 0.45;
          if (sniperAmmo <= 0) weaponMode = "normal";
          return;
        }

        if (weaponMode === "freeze") {
          if (freezeAmmo <= 0) {
            weaponMode = "normal";
            return;
          }
          bullets.push({
            x: player.x + (player.face > 0 ? player.w - 2 : -8),
            y: player.y + player.h * 0.5 - 2,
            w: 10, h: 4,
            vx: player.face * 700,
            vy: rand(-18, 18),
            life: 1.6,
            damage: scaledDamage(55),
            kind: "freeze"
          });
          freezeAmmo--;
          fireCd = 0.11;
          if (freezeAmmo <= 0) weaponMode = "normal";
          return;
        }

        if (ammo <= 0) {
          reloadTimer = 2;
          return;
        }
        bullets.push({
          x: player.x + (player.face > 0 ? player.w - 2 : -8),
          y: player.y + player.h * 0.5 - 2,
          w: 10, h: 4,
          vx: player.face * 760,
          vy: rand(-20, 20),
          life: 1.4,
          damage: scaledDamage(50),
          kind: "normal"
        });
        ammo--;
        fireCd = 0.22;
        if (ammo <= 0) reloadTimer = 2;
      }

      function doMeleeAttack() {
        if (meleeCd > 0) return;

        const swordBoost = weaponMode === "sword" && swordUses > 0;
        const range = swordBoost ? 140 : 70;
        const dmg = scaledDamage(swordBoost ? 500 : 100);

        if (swordBoost) {
          swordUses--;
          if (swordUses <= 0) weaponMode = "normal";
        }

        meleeCd = swordBoost ? 0.28 : 0.36;
        meleeFx = 0.15;
        invincible = Math.max(invincible, 0.29);

        const hitBox = {
          x: player.face > 0 ? player.x + player.w : player.x - range,
          y: player.y - 8,
          w: range,
          h: player.h + 16
        };

        for (const m of [...monsters]) {
          if (m.respawnTimer > 0) continue;
          if (!intersects(hitBox, m)) continue;
          m.hp -= dmg;
          m.vx = player.face * (m.type === "boss" ? 280 : 620);
          m.vy = -260;
          m.stun = m.type === "boss" ? 0.2 : 0.32;
          m.hitFlash = 0.4;
          shake = Math.max(shake, 0.3);
          if (m.hp <= 0) {
            resolveMonsterZeroHp(m);
          }
        }
      }

      function updatePlayer(dt) {
        const ladder = getLadderTouch(player);
        const up = keys.has("w");
        const down = keys.has("s");
        const left = keys.has("a");
        const right = keys.has("d");
        const kHeld = keys.has("k");

        player.dropTimer = Math.max(0, player.dropTimer - dt);
        playerBindTimer = Math.max(0, playerBindTimer - dt);
        playerSlowTimer = Math.max(0, playerSlowTimer - dt);
        fireCd = Math.max(0, fireCd - dt);
        meleeCd = Math.max(0, meleeCd - dt);
        meleeFx = Math.max(0, meleeFx - dt);
        if (reloadTimer > 0) {
          reloadTimer = Math.max(0, reloadTimer - dt);
          if (reloadTimer <= 0) ammo = maxAmmo;
        }

        const moveScale = playerSlowTimer > 0 ? 0.5 : 1;
        if (playerBindTimer > 0) {
          player.vx = 0;
        } else if (left) { player.vx = -player.speed * moveScale; player.face = -1; }
        else if (right) { player.vx = player.speed * moveScale; player.face = 1; }
        else {
          player.vx *= 0.82;
          if (Math.abs(player.vx) < 5) player.vx = 0;
        }

        player.onLadder = playerBindTimer <= 0 && !!ladder && (up || down);
        if (player.onLadder) {
          if (up && !down) player.vy = -230;
          else if (down && !up) player.vy = 230;
          else player.vy = 0;
        } else {
          player.vy += 1200 * dt;
          if (playerBindTimer <= 0 && up && player.onGround) player.vy = -player.jump;
          if (down && player.onGround && isStandingOnSemi(player)) {
            player.dropTimer = 0.22;
            player.vy = Math.max(player.vy, 220);
            player.onGround = false;
          }
        }

        moveEntity(player, dt);

        if (keys.has("j") && fireCd <= 0) playerFire();
        if (kHeld && !lastK) doMeleeAttack();
        lastK = kHeld;
      }

      function fireEnemyBullet(from, tx, ty, speed, kind) {
        const ox = from.x + from.w * 0.5;
        const oy = from.y + from.h * 0.45;
        const dx = tx - ox;
        const dy = ty - oy;
        const len = Math.hypot(dx, dy) || 1;
        enemyBullets.push({
          x: ox,
          y: oy,
          w: kind === "wave" ? 18 : 8,
          h: kind === "wave" ? 18 : 8,
          vx: (dx / len) * speed,
          vy: (dy / len) * speed,
          life: kind === "wave" ? 6 : 4,
          kind
        });
      }

      function updateMonster(m, dt) {
        if (m.respawnTimer > 0) {
          m.respawnTimer = Math.max(0, m.respawnTimer - dt);
          return;
        }

        m.dropTimer = Math.max(0, (m.dropTimer || 0) - dt);
        m.huntTimer += dt;
        if (intersects(m, player)) m.huntTimer = 0;
        if (m.type === "normal" && m.huntTimer >= 10) {
          spawnInCurrentScreen(m, true);
          return;
        }

        if (m.stun > 0) {
          m.stun = Math.max(0, m.stun - dt);
          m.vy += 1100 * dt;
          moveEntity(m, dt);
          m.hitFlash = Math.max(0, m.hitFlash - dt);
          return;
        }

        const dx = player.x - m.x;
        const dy = player.y - m.y;
        const dir = Math.sign(dx || 1);
        m.vx = dir * m.speed;

        if (m.type === "boss" && m.laserState === "fire") {
          m.vx = 0;
        }

        const ladder = getLadderTouch(m);
        const wantsClimb = ladder && Math.abs(dy) > 70;
        if (wantsClimb) {
          m.onLadder = true;
          m.vy = dy > 0 ? 120 : -120;
          m.vx *= 0.55;
        } else {
          m.onLadder = false;
          m.vy += 1100 * dt;
        }

        if (m.onGround && dy > 70 && isStandingOnSemi(m)) {
          m.dropTimer = 0.22;
          m.vy = Math.max(m.vy, 210);
          m.onGround = false;
        }

        m.jumpCd -= dt;
        const nearWall = fullSolids().some((s) => {
          const probe = { x: m.x + dir * 8, y: m.y + 6, w: m.w, h: m.h - 12 };
          return intersects(probe, s);
        });
        if (m.onGround && m.jumpCd <= 0 && (nearWall || (dy < -110 && Math.random() < 0.6))) {
          m.vy = m.type === "boss" ? -500 : -420;
          m.jumpCd = rand(0.6, 1.5);
        }

        m.shootCd -= dt;
        if (m.shootCd <= 0 && !(m.type === "boss" && m.laserState === "charge")) {
          m.shootCd = 3;
          fireEnemyBullet(m, player.x + player.w * 0.5, player.y + player.h * 0.45, m.type === "boss" ? 300 : 260, "shot");
        }

        if (m.type === "boss") {
          if (m.revivePending) {
            m.vx = 0;
            m.vy += 800 * dt;
            m.reviveTimer -= dt;
            if (m.reviveTimer <= 0) {
              if (m.reviveCharges > 0) {
                m.reviveCharges--;
                m.revivePending = false;
                m.hp = Math.floor(m.maxHp * 0.5);
                setSkillBanner("法老复活成功！");
              } else {
                resolveMonsterZeroHp(m);
                return;
              }
            }
            moveEntity(m, dt);
            return;
          }

          const cdScale = m.isDracula ? 0.28 : 1;
          m.slamCd -= dt;
          m.waveCd -= dt;
          m.dashCd -= dt;
          m.meteorCd -= dt;
          m.summonCd -= dt;
          m.sigilCd -= dt;
          m.laserCd -= dt;
          m.webCd -= dt;
          m.trapCd -= dt;
          m.leapCd -= dt;
          m.barrageCd -= dt;
          m.ramCd -= dt;

          if (m.bossName === "狂怒巨像" || m.bossName === "德古拉") {
            if (m.bossName === "德古拉") {
              if (m.laserState === "charge") {
                m.laserTimer -= dt;
                if (m.laserTimer <= 0) {
                  m.laserState = "fire";
                  m.laserTimer = 1.2;
                }
              } else if (m.laserState === "fire") {
                m.laserTimer -= dt;
                const beamY = m.y + m.h * 0.45;
                const target = { x: m.laserDir > 0 ? m.x : 0, y: beamY - 8, w: m.laserDir > 0 ? world.w - m.x : m.x, h: 16 };
                if (intersects(player, target)) damagePlayer(m.x, 2);
                if (m.laserTimer <= 0) m.laserState = "idle";
              } else if (m.laserCd <= 0) {
                m.laserCd = 4;
                m.laserState = "charge";
                m.laserTimer = 3;
                m.laserDir = Math.sign(dx || 1);
                setSkillBanner(`${m.bossName}释放：激光炮蓄力！`);
              }
            }

            if (m.slamCd <= 0 && Math.abs(dx) < 260 && Math.abs(dy) < 180) {
              m.slamCd = 8 * cdScale;
              shake = Math.max(shake, 1.0);
              setSkillBanner(`${m.bossName}释放：地动山摇！`);
              player.dropTimer = 0.9;
              if (player.y + player.h < m.y + 20) player.vy = Math.max(player.vy, 620);
              bossFx.push({ type: "slam", x: m.x + m.w * 0.5, y: m.y + m.h * 0.8, r: 20, life: 0.8 });
            }
            if (m.waveCd <= 0) {
              m.waveCd = 11 * cdScale;
              m.waveBurst = 3;
              m.waveTick = 0;
              setSkillBanner(`${m.bossName}释放：连续冲击波！`);
            }
            if (m.waveBurst > 0) {
              m.waveTick -= dt;
              if (m.waveTick <= 0) {
                m.waveTick = 0.28;
                m.waveBurst--;
                fireEnemyBullet(m, player.x + player.w * 0.5, player.y + player.h * 0.5, 170, "wave");
              }
            }
            if (m.dashCd <= 0 && m.onGround && Math.abs(dx) > 150 && Math.abs(dx) < 540) {
              m.dashCd = 8 * cdScale;
              setSkillBanner(`${m.bossName}释放：野蛮冲撞！`);
              m.vx = Math.sign(dx || 1) * 820;
              m.vy = -120;
              bossFx.push({ type: "dash", x: m.x + m.w * 0.5, y: m.y + m.h * 0.5, r: 30, life: 0.45 });
            }
            if (m.meteorCd <= 0) {
              m.meteorCd = 13 * cdScale;
              setSkillBanner(`${m.bossName}释放：陨石雨！`);
              for (let i = 0; i < 5; i++) {
                enemyBullets.push({
                  x: player.x + player.w * 0.5 + rand(-260, 260),
                  y: player.y - 360 - rand(0, 220),
                  w: 14, h: 14, vx: rand(-35, 35), vy: rand(220, 300), life: 4.2, kind: "meteor"
                });
              }
            }
            if (m.isDracula && m.summonCd <= 0) {
              m.summonCd = 2.4;
              setSkillBanner(`${m.bossName}释放：召唤仆人！`);
              summonServant(m);
            }
            if (m.isDracula && m.sigilCd <= 0) {
              m.sigilCd = 2.6;
              setSkillBanner(`${m.bossName}释放：召唤魔法！`);
              for (let i = 0; i < 3; i++) {
                bossTelegraphs.push({
                  x: player.x + player.w * 0.5 + rand(-220, 220),
                  y: player.y + player.h * 0.5 + rand(-80, 80),
                  r: rand(50, 90),
                  timer: 1.1,
                  explode: 0.32
                });
              }
            }
          }

          const useSpiderKit = (m.bossName === "毒牙蜘蛛" || m.bossName === "德古拉");
          if (useSpiderKit) {
            if (m.webCd <= 0) {
              m.webCd = 7;
              setSkillBanner(`${m.bossName}：漫天蛛网！`);
              for (let i = 0; i < 14; i++) {
                enemyBullets.push({
                  x: rand(20, world.w - 20),
                  y: camera.y - 80 - rand(0, 220),
                  w: 20, h: 20, vx: rand(-15, 15), vy: rand(170, 240), life: 5, kind: "web"
                });
              }
            }
            if (m.trapCd <= 0) {
              m.trapCd = 6;
              setSkillBanner(`${m.bossName}：毒牙侵蚀！`);
              for (let i = 0; i < 3; i++) {
                bossTraps.push({
                  x: rand(30, world.w - 30),
                  y: rand(world.h * 0.35, world.h - 120),
                  r: rand(24, 34),
                  ttl: 9
                });
              }
            }
            if (m.leapCd <= 0) {
              m.leapCd = 5;
              setSkillBanner(`${m.bossName}：飞天蜘蛛！`);
              const p = findPlatformByX(player.x + player.w * 0.5);
              const tx = p.x + p.w * 0.5;
              m.vx = Math.sign(tx - (m.x + m.w * 0.5)) * 420;
              m.vy = -520;
            }
          }

          const useFireKit = (m.bossName === "地狱火焰鸟" || m.bossName === "德古拉");
          if (useFireKit) {
            if (m.barrageCd <= 0) {
              m.barrageCd = 7;
              m.barrageShots = 10;
              m.barrageTick = 0;
              setSkillBanner(`${m.bossName}：火焰侵蚀！`);
            }
            if (m.barrageShots > 0) {
              m.barrageTick -= dt;
              if (m.barrageTick <= 0) {
                m.barrageTick = 0.18;
                m.barrageShots--;
                fireEnemyBullet(m, player.x + player.w * 0.5, player.y + player.h * 0.5, 260, "fireball");
              }
            }
            if (m.ramState === "idle" && m.ramCd <= 0) {
              m.ramCd = 9;
              m.ramState = "charge";
              m.ramTimer = 2;
              m.ramDir = Math.sign(dx || 1);
              setSkillBanner(`${m.bossName}：横冲直撞！`);
            }
            if (m.ramState === "charge") {
              m.vx = 0;
              m.ramTimer -= dt;
              if (m.ramTimer <= 0) {
                m.ramState = "dashOut";
                m.ramTimer = 0.5;
              }
            } else if (m.ramState === "dashOut") {
              m.vx = m.ramDir * 1100;
              if (intersects(m, player)) damagePlayer(m.x, 2);
              m.ramTimer -= dt;
              if (m.ramTimer <= 0) {
                m.ramState = "dashBack";
                m.ramTimer = 0.5;
              }
            } else if (m.ramState === "dashBack") {
              m.vx = -m.ramDir * 1100;
              if (intersects(m, player)) damagePlayer(m.x, 2);
              m.ramTimer -= dt;
              if (m.ramTimer <= 0) {
                m.ramState = "idle";
              }
            }
          }

          const usePharaohKit = (m.bossName === "埃及法老" || m.bossName === "德古拉");
          if (usePharaohKit) {
            if (m.sigilCd <= 0) {
              m.sigilCd = 6;
              playerSlowTimer = 3;
              setSkillBanner(`${m.bossName}：诅咒！`);
            }
          }
        }

        moveEntity(m, dt);
        m.hitFlash = Math.max(0, m.hitFlash - dt);
      }

      function updatePlayerBullets(dt) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];

          if (b.kind === "rpg") {
            const targets = monsters.filter((m) => m.respawnTimer <= 0);
            if (targets.length) {
              let best = targets[0];
              let bestDist = 1e9;
              for (const m of targets) {
                const dx = m.x + m.w * 0.5 - b.x;
                const dy = m.y + m.h * 0.5 - b.y;
                const d = Math.hypot(dx, dy);
                if (d < bestDist) {
                  bestDist = d;
                  best = m;
                }
              }
              const tx = best.x + best.w * 0.5;
              const ty = best.y + best.h * 0.5;
              const dx = tx - b.x;
              const dy = ty - b.y;
              const len = Math.hypot(dx, dy) || 1;
              b.vx += (dx / len) * 420 * dt;
              b.vy += (dy / len) * 420 * dt;
              const sp = Math.hypot(b.vx, b.vy) || 1;
              const maxSp = 470;
              if (sp > maxSp) {
                b.vx = (b.vx / sp) * maxSp;
                b.vy = (b.vy / sp) * maxSp;
              }
            }
          }

          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.life -= dt;
          let remove = b.life <= 0 || b.x < -20 || b.x > world.w + 20 || b.y < -20 || b.y > world.h + 20;

          for (const s of allBulletSolids()) {
            if (intersects(b, s)) {
              if (b.kind === "rpg") {
                bossFx.push({ type: "boom", x: b.x, y: b.y, r: 18, life: 0.35 });
                for (const m of [...monsters]) {
                  const dx = m.x + m.w * 0.5 - b.x;
                  const dy = m.y + m.h * 0.5 - b.y;
                  if (Math.hypot(dx, dy) < 160) {
                    m.hp -= b.damage;
                    m.vx += Math.sign(dx || 1) * 380;
                    m.vy = -260;
                    m.stun = 0.35;
                    m.hitFlash = 0.5;
                    if (m.hp <= 0) {
                      resolveMonsterZeroHp(m);
                    }
                  }
                }
                shake = Math.max(shake, 1.1);
              }
              remove = true;
              break;
            }
          }

          for (const m of [...monsters]) {
            if (m.respawnTimer > 0) continue;
            if (intersects(b, m)) {
              const kb = Math.sign(b.vx || 1);
              m.vx = kb * (m.type === "boss" ? 250 : 540);
              m.vy = m.type === "boss" ? -220 : -320;
              if (b.kind === "freeze") m.stun = m.type === "boss" ? 0.7 : 1.2;
              else m.stun = m.type === "boss" ? 0.15 : 0.28;
              m.hitFlash = 0.36;
              shake = Math.max(shake, m.type === "boss" ? 0.45 : 0.3);
              for (let p = 0; p < (m.type === "boss" ? 12 : 8); p++) {
                hitParticles.push({
                  x: m.x + m.w * 0.5,
                  y: m.y + m.h * 0.45,
                  vx: kb * rand(40, 220) + rand(-70, 70),
                  vy: rand(-240, -40),
                  life: rand(0.12, 0.3)
                });
              }
              m.hp = Math.max(0, m.hp - b.damage);
              if (m.hp <= 0) {
                resolveMonsterZeroHp(m);
              }
              remove = true;
              break;
            }
          }
          if (remove) bullets.splice(i, 1);
        }
      }

      function updateEnemyBullets(dt) {
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const b = enemyBullets[i];
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.life -= dt;
          let remove = b.life <= 0 || b.x < -30 || b.x > world.w + 30 || b.y < -30 || b.y > world.h + 30;

          if (b.kind !== "wave" && b.kind !== "meteor" && b.kind !== "fireball" && b.kind !== "web") {
            for (const s of allBulletSolids()) {
              if (intersects(b, s)) { remove = true; break; }
            }
          }

          if (!remove && intersects(b, player)) {
            if (b.kind === "web") {
              playerBindTimer = Math.max(playerBindTimer, 3);
              setSkillBanner("你被蛛网束缚了！");
            } else {
              const damage = (b.kind === "wave" || b.kind === "meteor" || b.kind === "fireball") ? 2 : 1;
              damagePlayer(b.x, damage);
            }
            remove = true;
          }

          if (remove) enemyBullets.splice(i, 1);
        }
      }

      function updateSpecialWeapon(dt) {
        if (specialItems.length > 0) {
          for (let i = specialItems.length - 1; i >= 0; i--) {
            const item = specialItems[i];
            item.ttl -= dt;
            if (item.ttl <= 0) {
              specialItems.splice(i, 1);
              continue;
            }
            if (intersects(player, item)) {
              grantSpecial(item.type);
              specialItems.splice(i, 1);
            }
          }
          if (specialItems.length === 0) specialSpawnTimer = 15;
          return;
        }

        specialSpawnTimer -= dt;
        if (specialSpawnTimer <= 0) {
          spawnSpecialItem();
          specialSpawnTimer = 15;
        }
      }

      function updateHealthItem(dt) {
        if (healthItem) {
          healthItem.ttl -= dt;
          if (healthItem.ttl <= 0) {
            healthItem = null;
            healthSpawnTimer = 30;
          } else if (intersects(player, healthItem)) {
            lives = Math.min(5, lives + 1);
            healthItem = null;
            healthSpawnTimer = 30;
            setSkillBanner("拾取血包，生命恢复！");
          }
          return;
        }

        healthSpawnTimer -= dt;
        if (healthSpawnTimer <= 0) {
          spawnHealthItem();
          healthSpawnTimer = 30;
        }
      }

      function updateDoor() {
        const bossAlive = monsters.some((m) => m.type === "boss");
        const allCleared = monsters.length === 0;
        if (!door && !bossAlive && (elapsed >= 60 || allCleared)) {
          const candidates = reachablePlatforms
            .filter((idx) => idx > 0)
            .map((idx) => platforms[idx])
            .filter((p) => Math.abs((p.x + p.w * 0.5) - (player.x + player.w * 0.5)) > 320);
          const pool = candidates.length ? candidates : [platforms[0]];
          const p = pool[randi(0, pool.length - 1)];
          door = { x: p.x + rand(10, Math.max(12, p.w - 62)), y: p.y - 74, w: 54, h: 74, pulse: 0 };
        }

        if (door) {
          door.pulse += 0.08;
          if (intersects(player, door)) {
            level++;
            makeLevel(level, true);
            victoryFlash = 1.2;
          }
        }
      }

      function updateDamage(dt) {
        invincible = Math.max(0, invincible - dt);
        for (const m of monsters) {
          if (m.respawnTimer > 0) continue;
          if (intersects(player, m)) {
            damagePlayer(m.x);
            m.huntTimer = 0;
            break;
          }
        }
      }

      function updateCamera() {
        const tx = player.x + player.w * 0.5 - vw * 0.5;
        const ty = player.y + player.h * 0.5 - vh * 0.55;
        camera.x += (tx - camera.x) * 0.08;
        camera.y += (ty - camera.y) * 0.08;
        camera.x = clamp(camera.x, 0, Math.max(0, world.w - vw));
        camera.y = clamp(camera.y, 0, Math.max(0, world.h - vh));
      }

      function updateEffects(dt) {
        shake = Math.max(0, shake - dt * 1.8);
        if (skillBanner.timer > 0) skillBanner.timer = Math.max(0, skillBanner.timer - dt);
        for (let i = hitParticles.length - 1; i >= 0; i--) {
          const p = hitParticles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 780 * dt;
          p.life -= dt;
          if (p.life <= 0) hitParticles.splice(i, 1);
        }
        for (let i = bossFx.length - 1; i >= 0; i--) {
          const fx = bossFx[i];
          fx.life -= dt;
          fx.r += (fx.type === "slam" ? 360 : 280) * dt;
          if (fx.life <= 0) bossFx.splice(i, 1);
        }

        for (let i = bossTelegraphs.length - 1; i >= 0; i--) {
          const g = bossTelegraphs[i];
          g.timer -= dt;
          if (g.timer <= 0) {
            if (g.explode > 0) {
              g.explode -= dt;
              const dx = player.x + player.w * 0.5 - g.x;
              const dy = player.y + player.h * 0.5 - g.y;
              if (Math.hypot(dx, dy) < g.r) damagePlayer(g.x, 2);
              bossFx.push({ type: "boom", x: g.x, y: g.y, r: g.r * 0.45, life: 0.2 });
              g.explode = 0;
            } else {
              bossTelegraphs.splice(i, 1);
            }
          }
        }

        for (let i = bossTraps.length - 1; i >= 0; i--) {
          const t = bossTraps[i];
          t.ttl -= dt;
          if (t.ttl <= 0) {
            bossTraps.splice(i, 1);
            continue;
          }
          const dx = player.x + player.w * 0.5 - t.x;
          const dy = player.y + player.h * 0.5 - t.y;
          if (Math.hypot(dx, dy) < t.r) {
            damagePlayer(t.x, 1);
            bossTraps.splice(i, 1);
          }
        }
      }

      function drawSky() {
        const grad = ctx.createLinearGradient(0, 0, 0, vh);
        if (level === 4) {
          grad.addColorStop(0, "#1c1a1f");
          grad.addColorStop(0.6, "#3a2f22");
          grad.addColorStop(1, "#271f18");
        } else if (level === 6) {
          grad.addColorStop(0, "#38130d");
          grad.addColorStop(0.55, "#7e2812");
          grad.addColorStop(1, "#2b120d");
        } else if (level === 8) {
          grad.addColorStop(0, "#f5d27d");
          grad.addColorStop(0.6, "#d8b25d");
          grad.addColorStop(1, "#9f7c33");
        } else if (level === 10) {
          grad.addColorStop(0, "#1e2338");
          grad.addColorStop(0.6, "#3a3148");
          grad.addColorStop(1, "#191522");
        } else {
          grad.addColorStop(0, "#71c3ff");
          grad.addColorStop(0.6, "#c7ecff");
          grad.addColorStop(1, "#ecffed");
        }
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, vw, vh);

        for (let i = 0; i < 10; i++) {
          const x = ((i * 280 - camera.x * 0.22) % (vw + 360)) - 120;
          const y = 78 + (i % 3) * 58 + Math.sin(performance.now() * 0.00035 + i) * 8;
          ctx.fillStyle = "rgba(255,255,255,0.88)";
          ctx.beginPath();
          ctx.arc(x, y, 30, 0, Math.PI * 2);
          ctx.arc(x + 34, y + 8, 24, 0, Math.PI * 2);
          ctx.arc(x - 30, y + 10, 22, 0, Math.PI * 2);
          ctx.fill();
        }

        const gy = vh * 0.74;
        if (level === 4) {
          ctx.fillStyle = "#45311f";
          ctx.fillRect(0, gy, vw, vh - gy);
        } else if (level === 6) {
          ctx.fillStyle = "#5e1f15";
          ctx.fillRect(0, gy, vw, vh - gy);
        } else if (level === 8) {
          ctx.fillStyle = "#c69b4f";
          ctx.fillRect(0, gy, vw, vh - gy);
          ctx.fillStyle = "rgba(112,84,36,0.65)";
          ctx.beginPath();
          ctx.moveTo(vw * 0.75, gy);
          ctx.lineTo(vw * 0.9, gy - 140);
          ctx.lineTo(vw * 1.02, gy);
          ctx.fill();
        } else if (level === 10) {
          ctx.fillStyle = "#2d2d36";
          ctx.fillRect(0, gy, vw, vh - gy);
          ctx.fillStyle = "rgba(120,120,150,0.4)";
          ctx.fillRect(vw * 0.72, gy - 160, 130, 160);
        } else {
          ctx.fillStyle = "#90d783";
          ctx.fillRect(0, gy, vw, vh - gy);
          ctx.fillStyle = "#6ec366";
          for (let i = 0; i < 8; i++) {
            const hx = ((i * 240 - camera.x * 0.15) % (vw + 260)) - 130;
            ctx.beginPath();
            ctx.moveTo(hx - 120, vh);
            ctx.quadraticCurveTo(hx, vh * 0.62, hx + 120, vh);
            ctx.fill();
          }
        }
      }

      function drawSpecialItem(item) {
        if (!item) return;
        const pulse = 0.6 + Math.sin(performance.now() * 0.01) * 0.4;
        if (item.type === "mg") {
          ctx.fillStyle = `rgba(255,209,96,${0.7 + pulse * 0.2})`;
          ctx.fillRect(item.x, item.y, item.w, item.h);
          ctx.fillStyle = "#5a3f21";
          ctx.fillRect(item.x + 5, item.y + 12, 22, 6);
        } else if (item.type === "sword") {
          ctx.fillStyle = `rgba(176,232,255,${0.65 + pulse * 0.25})`;
          ctx.fillRect(item.x, item.y, item.w, item.h);
          ctx.fillStyle = "#c7ecff";
          ctx.fillRect(item.x + 15, item.y + 4, 4, 20);
          ctx.fillStyle = "#6b4f32";
          ctx.fillRect(item.x + 10, item.y + 22, 14, 4);
        } else if (item.type === "rpg") {
          ctx.fillStyle = `rgba(255,146,102,${0.65 + pulse * 0.25})`;
          ctx.fillRect(item.x, item.y, item.w, item.h);
          ctx.fillStyle = "#5f5f5f";
          ctx.fillRect(item.x + 6, item.y + 10, 22, 9);
        } else if (item.type === "sniper") {
          ctx.fillStyle = `rgba(197,255,154,${0.65 + pulse * 0.25})`;
          ctx.fillRect(item.x, item.y, item.w, item.h);
          ctx.fillStyle = "#2f4a22";
          ctx.fillRect(item.x + 4, item.y + 12, 24, 5);
        } else if (item.type === "freeze") {
          ctx.fillStyle = `rgba(156,225,255,${0.65 + pulse * 0.25})`;
          ctx.fillRect(item.x, item.y, item.w, item.h);
          ctx.fillStyle = "#2e6f8a";
          ctx.fillRect(item.x + 8, item.y + 8, 18, 12);
        }
      }

      function drawHealthItem(item) {
        if (!item) return;
        const pulse = 0.6 + Math.sin(performance.now() * 0.012) * 0.4;
        ctx.fillStyle = `rgba(255,120,120,${0.75 + pulse * 0.2})`;
        ctx.fillRect(item.x, item.y, item.w, item.h);
        ctx.fillStyle = "#fff";
        ctx.fillRect(item.x + 11, item.y + 5, 6, 18);
        ctx.fillRect(item.x + 5, item.y + 11, 18, 6);
      }

      function drawWorld() {
        drawSky();

        ctx.save();
        const sx = (Math.random() * 2 - 1) * shake * 14;
        const sy = (Math.random() * 2 - 1) * shake * 10;
        ctx.translate(-camera.x + sx, -camera.y + sy);

        for (let i = 0; i < platforms.length; i++) {
          const p = platforms[i];
          if (i === 0) {
            ctx.fillStyle = "#4d9b44";
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#73c461";
            ctx.fillRect(p.x, p.y, p.w, 7);
          } else {
            ctx.fillStyle = "#7c5d42";
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#58a750";
            ctx.fillRect(p.x, p.y, p.w, 5);
          }
        }

        for (const o of obstacles) {
          ctx.fillStyle = "#4f8f4b";
          ctx.fillRect(o.x, o.y, o.w, o.h);
          ctx.strokeStyle = "rgba(30,85,32,0.45)";
          ctx.strokeRect(o.x + 1, o.y + 1, o.w - 2, o.h - 2);
        }

        for (const l of ladders) {
          ctx.fillStyle = "#815b34";
          ctx.fillRect(l.x + l.w * 0.34, l.y, l.w * 0.32, l.h);
          ctx.fillStyle = "#b08249";
          for (let y = l.y + 8; y < l.y + l.h - 6; y += 18) ctx.fillRect(l.x + 2, y, l.w - 4, 3);
        }

        if (door) {
          const glow = 0.5 + Math.sin(door.pulse * 3.5) * 0.5;
          ctx.fillStyle = `rgba(255,242,145,${0.3 + glow * 0.35})`;
          ctx.fillRect(door.x - 9, door.y - 9, door.w + 18, door.h + 18);
          ctx.fillStyle = "#4f77b8";
          ctx.fillRect(door.x, door.y, door.w, door.h);
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 3;
          ctx.strokeRect(door.x + 2, door.y + 2, door.w - 4, door.h - 4);
        }

        for (const item of specialItems) drawSpecialItem(item);
        drawHealthItem(healthItem);

        for (const fx of bossFx) {
          const alpha = Math.max(0, fx.life * 1.2);
          ctx.strokeStyle = fx.type === "slam"
            ? `rgba(255,160,120,${alpha})`
            : fx.type === "dash"
            ? `rgba(255,120,120,${alpha})`
            : `rgba(255,220,120,${alpha})`;
          ctx.lineWidth = fx.type === "slam" ? 8 : fx.type === "dash" ? 6 : 5;
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, fx.r, 0, Math.PI * 2);
          ctx.stroke();
        }

        for (const g of bossTelegraphs) {
          const alpha = g.timer > 0 ? 0.35 : 0.8;
          ctx.strokeStyle = `rgba(255,80,80,${alpha})`;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = `rgba(255,80,80,${alpha * 0.18})`;
          ctx.beginPath();
          ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
          ctx.fill();
        }

        for (const t of bossTraps) {
          ctx.strokeStyle = "rgba(106,255,124,0.75)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = "rgba(106,255,124,0.18)";
          ctx.beginPath();
          ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
          ctx.fill();
        }

        for (const b of bullets) {
          if (b.kind === "rpg") ctx.fillStyle = "#ff8c52";
          else if (b.kind === "sniper") ctx.fillStyle = "#d7ff93";
          else if (b.kind === "freeze") ctx.fillStyle = "#9be5ff";
          else if (b.kind === "mg") ctx.fillStyle = "#ffe283";
          else ctx.fillStyle = "#fff4c2";
          ctx.fillRect(b.x, b.y, b.w, b.h);
        }

        for (const b of enemyBullets) {
          if (b.kind === "wave") {
            ctx.fillStyle = "rgba(227,124,72,0.75)";
            ctx.beginPath();
            ctx.arc(b.x, b.y, 10, 0, Math.PI * 2);
            ctx.fill();
          } else if (b.kind === "meteor") {
            ctx.fillStyle = "rgba(255,110,70,0.82)";
            ctx.beginPath();
            ctx.arc(b.x, b.y, 9, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillStyle = "#d14c4c";
            ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
          }
        }

        for (const p of hitParticles) {
          ctx.fillStyle = `rgba(255,210,140,${Math.max(0, p.life * 4)})`;
          ctx.fillRect(p.x, p.y, 3, 3);
        }

        for (const m of monsters) {
          if (m.respawnTimer > 0) {
            const t = 1 - m.respawnTimer / 0.75;
            const r = 24 + t * (m.w * 0.7);
            ctx.strokeStyle = `rgba(255,255,255,${0.35 + t * 0.4})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(m.x + m.w * 0.5, m.y + m.h * 0.5, r, 0, Math.PI * 2);
            ctx.stroke();
          }

          if (m.type === "boss") {
            if (m.bossName === "毒牙蜘蛛") {
              ctx.fillStyle = m.hitFlash > 0 ? "#9a7b64" : "#5b4636";
              ctx.beginPath();
              ctx.ellipse(m.x + m.w * 0.5, m.y + m.h * 0.5, m.w * 0.45, m.h * 0.36, 0, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = "#d8c8b6";
              ctx.fillRect(m.x + m.w * 0.25, m.y + m.h * 0.35, 8, 8);
              ctx.fillRect(m.x + m.w * 0.62, m.y + m.h * 0.35, 8, 8);
            } else {
              ctx.fillStyle = m.hitFlash > 0 ? "#ffb3a4" : "#b95644";
              ctx.fillRect(m.x, m.y, m.w, m.h);
              ctx.fillStyle = "#ffe7db";
              ctx.fillRect(m.x + 18, m.y + 24, 10, 10);
              ctx.fillRect(m.x + m.w - 28, m.y + 24, 10, 10);
            }

            const hpRate = m.hp / m.maxHp;
            ctx.fillStyle = "rgba(0,0,0,0.25)";
            ctx.fillRect(m.x, m.y - 18, m.w, 8);
            ctx.fillStyle = "#d73939";
            ctx.fillRect(m.x, m.y - 18, m.w * hpRate, 8);
          } else {
            ctx.fillStyle = m.hitFlash > 0 ? "#f2a0a0" : "#9a4747";
            ctx.fillRect(m.x, m.y, m.w, m.h);
            ctx.fillStyle = "#f8e2e2";
            ctx.fillRect(m.x + 8, m.y + 10, 6, 6);
            ctx.fillRect(m.x + m.w - 14, m.y + 10, 6, 6);
          }
        }

        const boss = monsters.find((m) => m.type === "boss");
        if (boss && boss.laserState === "charge") {
          ctx.strokeStyle = "rgba(255,120,120,0.75)";
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.moveTo(boss.x + boss.w * 0.5, boss.y + boss.h * 0.45);
          ctx.lineTo(boss.x + boss.w * 0.5 + boss.laserDir * 500, boss.y + boss.h * 0.45);
          ctx.stroke();
        }
        if (boss && boss.laserState === "fire") {
          ctx.strokeStyle = "rgba(255,40,40,0.92)";
          ctx.lineWidth = 14;
          ctx.beginPath();
          ctx.moveTo(boss.x + boss.w * 0.5, boss.y + boss.h * 0.45);
          ctx.lineTo(boss.laserDir > 0 ? world.w : 0, boss.y + boss.h * 0.45);
          ctx.stroke();
        }

        const flicker = invincible > 0 && Math.floor(invincible * 12) % 2 === 0;
        if (!flicker) {
          ctx.fillStyle = weaponMode === "sword" ? "#316fd5" : "#2e84d5";
          ctx.fillRect(player.x, player.y, player.w, player.h);
          ctx.fillStyle = "#153f67";
          ctx.fillRect(player.x + 8, player.y + 10, 6, 6);
          ctx.fillRect(player.x + player.w - 14, player.y + 10, 6, 6);
        }

        if (meleeFx > 0) {
          ctx.strokeStyle = `rgba(255,255,255,${meleeFx * 4})`;
          ctx.lineWidth = 5;
          const radius = weaponMode === "sword" ? 68 : 42;
          const cx = player.x + player.w * 0.5 + player.face * 20;
          const cy = player.y + player.h * 0.5;
          ctx.beginPath();
          if (player.face > 0) ctx.arc(cx, cy, radius, -0.9, 0.9);
          else ctx.arc(cx, cy, radius, Math.PI - 0.9, Math.PI + 0.9);
          ctx.stroke();
        }

        ctx.restore();

        if (victoryFlash > 0) {
          victoryFlash = Math.max(0, victoryFlash - 1 / 60);
          ctx.fillStyle = `rgba(255,255,255,${victoryFlash * 0.18})`;
          ctx.fillRect(0, 0, vw, vh);
        }

        if (skillBanner.timer > 0) {
          const alpha = Math.min(1, skillBanner.timer * 1.6);
          ctx.fillStyle = `rgba(0,0,0,${0.35 * alpha})`;
          ctx.fillRect(vw * 0.5 - 210, 22, 420, 44);
          ctx.strokeStyle = `rgba(255,255,255,${0.7 * alpha})`;
          ctx.strokeRect(vw * 0.5 - 210, 22, 420, 44);
          ctx.fillStyle = `rgba(255,240,220,${alpha})`;
          ctx.font = "700 24px Segoe UI";
          ctx.textAlign = "center";
          ctx.fillText(skillBanner.text, vw * 0.5, 52);
          ctx.textAlign = "start";
        }

        const onScreenBoss = monsters.find((m) => m.type === "boss");
        if (onScreenBoss) {
          const barW = vw * 0.68;
          const x = (vw - barW) * 0.5;
          const y = vh - 42;
          const hpRate = Math.max(0, onScreenBoss.hp / onScreenBoss.maxHp);
          ctx.fillStyle = "rgba(0,0,0,0.38)";
          ctx.fillRect(x, y, barW, 20);
          ctx.fillStyle = "#df4a4a";
          ctx.fillRect(x, y, barW * hpRate, 20);
          ctx.strokeStyle = "rgba(255,255,255,0.8)";
          ctx.strokeRect(x, y, barW, 20);
          ctx.fillStyle = "#fff4e8";
          ctx.font = "700 18px Segoe UI";
          ctx.textAlign = "center";
          ctx.fillText(`${onScreenBoss.bossName}  HP ${Math.max(0, Math.floor(onScreenBoss.hp))}/${onScreenBoss.maxHp}`, vw * 0.5, y - 8);
          ctx.textAlign = "start";
        }

        if (gameOver) {
          ctx.fillStyle = "rgba(12,22,16,0.48)";
          ctx.fillRect(0, 0, vw, vh);
          ctx.fillStyle = "#fff";
          ctx.textAlign = "center";
          ctx.font = "700 46px Segoe UI";
          ctx.fillText("Game Over", vw * 0.5, vh * 0.45);
          ctx.font = "600 24px Segoe UI";
          ctx.fillStyle = "#e7fff2";
          ctx.fillText("按 P 支付复活 / 按 R 重新开始", vw * 0.5, vh * 0.52);
          ctx.textAlign = "start";
        }

        if (gameWin) {
          ctx.fillStyle = "rgba(8,22,14,0.48)";
          ctx.fillRect(0, 0, vw, vh);
          ctx.fillStyle = "#fff";
          ctx.textAlign = "center";
          ctx.font = "700 44px Segoe UI";
          ctx.fillText("Victory", vw * 0.5, vh * 0.44);
          ctx.font = "600 24px Segoe UI";
          ctx.fillStyle = "#e7fff2";
          ctx.fillText("德古拉已被击败，按 R 重新开始", vw * 0.5, vh * 0.51);
          ctx.textAlign = "start";
        }
      }

      function updateHUD() {
        const remain = Math.max(0, 60 - elapsed);
        const boss = monsters.find((m) => m.type === "boss");
        const reloadText = reloadTimer > 0 ? `<span class="warn">换弹 ${reloadTimer.toFixed(1)}s</span>` : `<span class="safe">就绪</span>`;
        let weaponText = "普通枪";
        if (weaponMode === "mg") weaponText = `机关枪(${mgAmmo})`;
        else if (weaponMode === "sword") weaponText = `宝剑体术(${swordUses})`;
        else if (weaponMode === "rpg") weaponText = `RPG(${rpgAmmo})`;
        else if (weaponMode === "sniper") weaponText = `狙击枪(${sniperAmmo})`;
        else if (weaponMode === "freeze") weaponText = `冰冻枪(${freezeAmmo})`;
        hud.innerHTML =
          `关卡: <span class="safe">${level}</span> ${isBossLevel(level) ? '<span class="danger">[精英]</span>' : ""}<br>` +
          `角色等级: <span class="safe">Lv.${playerLevel}</span> 经验: <span>${playerExp}/${expPerLevel}</span><br>` +
          `生命: <span class="${lives <= 2 ? "danger" : "safe"}">${lives}/5</span><br>` +
          `弹药: <span class="${ammo <= 6 ? "danger" : "safe"}">${ammo}/${maxAmmo}</span> | ${reloadText}<br>` +
          `武器: <span class="warn">${weaponText}</span><br>` +
          `存活: <span class="safe">${elapsed.toFixed(1)}s</span> / 60s<br>` +
          `怪物数: <span class="danger">${monsters.length}</span><br>` +
          (boss ? `精英HP: <span class="danger">${boss.hp}</span><br>` : "") +
          `状态: ${invincible > 0 ? `<span class="safe">无敌 ${invincible.toFixed(1)}s</span>` : "正常"}<br>` +
          `特殊武器倒计时: <span>${Math.max(0, specialSpawnTimer).toFixed(1)}s</span><br>` +
          `血包倒计时: <span>${Math.max(0, healthSpawnTimer).toFixed(1)}s</span><br>` +
          (door ? '<span class="safe">大门已出现，快进入</span>' : `大门倒计时: <span>${remain.toFixed(1)}s</span>`);
      }

      let last = performance.now();
      function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;

        if (gameStarted && !gameOver && !gameWin) {
          elapsed += dt;
          updatePlayer(dt);
          updatePlayerBullets(dt);
          updateEnemyBullets(dt);
          for (const m of monsters) updateMonster(m, dt);
          updateDamage(dt);
          updateSpecialWeapon(dt);
          updateHealthItem(dt);
          updateDoor();
          updateCamera();
          updateEffects(dt);
        }

        drawWorld();
        updateHUD();
        requestAnimationFrame(loop);
      }

      window.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (["a", "d", "w", "s", "j", "k", "r", "p"].includes(k)) e.preventDefault();
        keys.add(k);
        if (k === "p" && gameOver && !gameWin) {
          payModal.style.display = "flex";
        }
        if (k === "r" && (gameOver || gameWin)) {
          level = 1;
          lives = 5;
          gameOver = false;
          gameWin = false;
          gameStarted = true;
          makeLevel(level, false);
        }
      });

      window.addEventListener("keyup", (e) => {
        keys.delete(e.key.toLowerCase());
      });

      startBtn.addEventListener("click", () => {
        startOverlay.style.display = "none";
        introOverlay.style.display = "flex";
      });

      enterBtn.addEventListener("click", () => {
        introOverlay.style.display = "none";
        gameStarted = true;
      });

      paidBtn.addEventListener("click", () => {
        if (!gameOver || gameWin) return;
        lives = 5;
        gameOver = false;
        invincible = 2;
        payModal.style.display = "none";
        setSkillBanner("支付成功，原地复活！");
      });

      cancelPayBtn.addEventListener("click", () => {
        payModal.style.display = "none";
      });

      window.addEventListener("resize", resize);

      resize();
      makeLevel(level, false);
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
